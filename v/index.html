<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Play Video Stream</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 12px;
    }
    .container {
      width: 100%;
      max-width: 420px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 20px;
      padding: 36px 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.65);
      position: relative;
      overflow: hidden;
      text-align: center;
    }
    .container::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 20% 30%, rgba(88,101,242,0.07) 0%, transparent 60%);
      pointer-events: none;
    }
    h1 {
      font-size: clamp(1.8rem, 5.5vw, 2.1rem);
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 16px;
      letter-spacing: -0.5px;
    }
    .error-msg {
      color: #ff6b6b;
      margin: 20px 0;
      font-size: 1.1rem;
      line-height: 1.4;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 18px 20px;
      margin: 14px 0;
      border-radius: 12px;
      font-size: clamp(1rem, 4vw, 1.08rem);
      font-weight: 600;
      text-decoration: none;
      text-align: center;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
      border: 1px solid transparent;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.45);
    }
    .btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.14), transparent);
      transition: left 0.6s;
    }
    .btn:hover::before {
      left: 100%;
    }
    .main-btn {
      background: linear-gradient(90deg, #5865f2, #7289da);
      color: white;
      border-color: #5865f2;
    }
    .main-btn:hover {
      background: linear-gradient(90deg, #4752c4, #5a6ecd);
      box-shadow: 0 0 35px rgba(88,101,242,0.45);
    }
    .alt-btn {
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
      font-size: clamp(0.92rem, 3.6vw, 0.98rem);
      line-height: 1.4;
      word-break: break-all;
    }
    .alt-btn:hover {
      background: #2d333b;
      color: white;
      border-color: #6e7681;
    }
    @media (max-width: 480px) {
      body { padding: 16px 10px; }
      .container {
        padding: 32px 20px;
        border-radius: 16px;
      }
      h1 { font-size: 1.85rem; }
      .btn { padding: 16px 18px; }
      .alt-btn { font-size: 0.94rem; padding: 16px 14px; }
    }
  </style>
</head>
<body>
  <div class="container" id="mainContainer">
    <h1>Click Link To Watch</h1>
    
    <a id="alt1" href="#" class="btn alt-btn"></a>
    <a id="mainlink" href="https://omg10.com/4/10714977" class="btn main-btn">Alternative Link!</a>
  </div>

  <script>
    function updateLinks() {
      const urlParams = new URLSearchParams(window.location.search);
      const videoId = urlParams.get('id')?.trim();

      const container = document.getElementById('mainContainer');
      const alt1 = document.getElementById('alt1');

      if (!videoId) {
        // Tampilkan pesan jika tidak ada ?id=
        if (container) {
          const errorDiv = document.createElement('div');
          errorDiv.className = 'error-msg';
          container.insertBefore(errorDiv, alt1);
        }
        if (alt1) {
          alt1.textContent = 'https://cdn.videy.co/';
          alt1.href = '#';
          alt1.style.pointerEvents = 'none';
        }
        return;
      }

      const playerUrl = `https://cdn-videycoi.site/v/?id=${videoId}`;
      
      const mp4Url = `https://cdn.videy.co/${videoId}.mp4`;

      if (alt1) {
        alt1.textContent = mp4Url;           // Tampilkan URL MP4
        alt1.href = playerUrl;               // Klik → ke player
        alt1.title = `Play video: ${videoId}`;
      }

    }

    window.addEventListener('load', updateLinks);
  </script>
</body>
</html>
